name: Bursa PN17/GN3 Monitor

on:
  schedule:
    # 02:00 UTC = 10:00 AM MYT (UTC+8), runs daily
    - cron: "0 2 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

permissions:
  contents: write      # required to push PDF + CSV commits back to repo

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python 3.11 ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bursaMY/requirements.txt

      # ── 4. Run the monitor script ───────────────────────────────────────────
      - name: Run Bursa PN17/GN3 monitor
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAILS:  ${{ secrets.NOTIFY_EMAILS }}
        run: python bursaMY/bursa_notifier.py

      # ── 5. Commit and push any changes ──────────────────────────────────────
      - name: Commit & push updates
        run: |
          git config user.name  "booluckgmie"
          git config user.email "booluckgmie@gmail.com"
          git pull --rebase
          git add bursaMY/pn17_gn3_pdfs/ \
                  bursaMY/pn17_gn3_companies.csv \
                  bursaMY/pn17_gn3_historical.csv \
                  bursaMY/summary-reportPN17.csv \
                  bursaMY/last_run.json
          git diff --cached --quiet || git commit -m "chore: auto-update $(date +'%Y-%m-%d') Bursa PN17/GN3 data"
          git push
