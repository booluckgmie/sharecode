name: Bursa PN17/GN3 Monitor

on:
  schedule:
    # 02:00 UTC = 10:00 AM MYT (UTC+8), runs daily
    - cron: "0 2 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

# Suppress Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write      # required to push CSV commits back to repo

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python 3.11 ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Python dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bursaMY/requirements.txt

      # ── 4. Install Playwright Chromium browser ───────────────────────────────
      #    Only used as fallback if cloudscraper cannot bypass Cloudflare.
      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      # ── 5. Run the monitor script ───────────────────────────────────────────
      - name: Run Bursa PN17/GN3 monitor
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_EMAILS:  ${{ secrets.NOTIFY_EMAILS }}
        run: python bursaMY/bursa_notifier.py

      # ── 6. Commit and push any changes ──────────────────────────────────────
      - name: Commit & push updates
        run: |
          git config user.name  "booluckgmie"
          git config user.email "booluckgmie@gmail.com"
          # Stage what the script wrote
          git add bursaMY/pn17_gn3_companies.csv \
                  bursaMY/pn17_gn3_historical.csv \
                  bursaMY/summary-reportPN17.csv \
                  bursaMY/last_run.json
          # Nothing changed → exit cleanly, skip push
          if git diff --cached --quiet; then
            echo "No changes to commit. Done."
            exit 0
          fi
          # Commit locally first, then push (no pull needed —
          # GitHub Actions checks out a fresh clone every run,
          # so there is never a remote commit ahead of us)
          git commit -m "chore: auto-update $(date +'%Y-%m-%d') Bursa PN17/GN3 data"
          git push
