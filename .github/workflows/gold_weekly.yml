name: Daily Gold Monitor

on:
  schedule:
    - cron: '23 3 * * *'  # 10:20 AM Malaysia Time (MYT = UTC+8) every day
  workflow_dispatch:       # Manual trigger for testing

jobs:
  build:
    runs-on: ubuntu-latest

    # Ensures all Python steps run inside the subfolder
    defaults:
      run:
        working-directory: ./aurumvibe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Required for reliable git pull/push operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AVG_COST: ${{ secrets.AVG_COST }}
        run: python gold_monitor.py

      - name: Commit and Push Updates
        # Run from repo root so git commands work correctly
        working-directory: ./
        run: |
          # 1. Setup identity
          git config --global user.email "booluckgmie@gmail.com"
          git config --global user.name "booluckgmie"

          # 2. Stash generated files to avoid unstaged change conflicts
          echo "Stashing local changes..."
          git stash

          # 3. Sync with remote master branch
          git fetch origin master
          git pull origin master --rebase

          # 4. Restore peak tracking file
          echo "Applying stashed changes..."
          git stash pop || echo "No stash to apply"

          # 5. Stage only the peak tracking file (chart PNG excluded)
          git add aurumvibe/last_peak.txt

          # 6. Commit and push only if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to last_peak.txt. Skipping commit."
          else
            git commit -m "chore: update gold peak data [skip ci]"
            git push origin HEAD:master --force
          fi
