name: Weekly Gold Monitor

on:
  schedule:
    - cron: '0 0 * * 1' # Runs at 08:00 AM Malaysia time every Monday
  workflow_dispatch: # Manual trigger for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This ensures all 'run' commands happen inside the aurumvibe folder
    defaults:
      run:
        working-directory: ./aurumvibe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Needed for the push back

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # If you set up AVG_COST as a secret:
          # AVG_COST: ${{ secrets.AVG_COST }} 
        run: python gold_monitor.py

      - name: Commit and Push Updates
        run: |
          # 1. Setup identity
          git config --global user.email "booluckgmie@gmail.com"
          git config --global user.name "booluckgmie"
          
          # 2. Sync with remote
          git fetch origin master
          git pull origin master --rebase
          
          # 3. Stage changes (specifically last_peak.txt)
          git add .
          
          # 4. Commit only if changes exist
          if git diff --staged --quiet; then
            echo "No changes to last_peak.txt. Skipping commit."
          else
            git commit -m "Update gold peak data [skip ci]"
            # 5. Push specifically to master branch
            git push origin HEAD:master --force
          fi
