name: Sabah Job Portal Scraping

on:
  schedule:
    # 10:00 AM Malaysia Time (MYT) = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Scrape jobs.sabah.gov.my
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # Required to push CSV files back to repo

    steps:
      # -------------------------------------------------------
      # 1. Checkout repo (includes previously committed CSVs)
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so we can compare across dates

      # -------------------------------------------------------
      # 2. Set up Python
      # -------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -------------------------------------------------------
      # 3. Cache pip dependencies
      # -------------------------------------------------------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # -------------------------------------------------------
      # 4. Install dependencies
      # -------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------------------------------
      # 5. Run scraper
      # -------------------------------------------------------
      - name: Run Sabah Job Scraper
        run: python scrape_sabah_jobs.py

      # -------------------------------------------------------
      # 6. Commit and push output CSVs
      # -------------------------------------------------------
      - name: Commit and push scraped data
        run: |
          git config --global user.email "booluckgmie@gmail.com"
          git config --global user.name "booluckgmie"

          git add data_jobsabah/

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ='Asia/Kuala_Lumpur' date '+%Y-%m-%d %H:%M MYT')
            git commit -m "chore: scrape sabah jobs – ${DATE}"
            git push
          fi
