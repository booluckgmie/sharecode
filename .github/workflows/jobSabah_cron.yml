name: Sabah Job Portal Scraping

on:
  schedule:
    # 10:00 AM Malaysia Time (MYT) = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    # Ensures all Python steps run inside the subfolder
    defaults:
      run:
        working-directory: ./aurumvibe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # Required for reliable git pull/push operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # -------------------------------------------------------
      # 5. Run scraper
      # -------------------------------------------------------
      - name: Run Sabah Job Scraper
        run: python scrape_sabah_jobs.py

      # -------------------------------------------------------
      # 6. Commit and push output CSVs
      # -------------------------------------------------------
      - name: Commit and push scraped data
        run: |
          git config --global user.email "booluckgmie@gmail.com"
          git config --global user.name "booluckgmie"

          git add data_jobsabah/

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ='Asia/Kuala_Lumpur' date '+%Y-%m-%d %H:%M MYT')
            git commit -m "chore: scrape sabah jobs – ${DATE}"
            git push
          fi
