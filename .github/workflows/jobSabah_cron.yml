name: Sabah Job Portal Scraping

on:
  schedule:
    # 10:00 AM Malaysia Time (MYT) = 02:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    # working-directory is the subfolder where your script + requirements.txt live
    defaults:
      run:
        working-directory: ./data_jobsabah

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          # Do NOT use cache: 'pip' with a custom working-directory —
          # it looks for requirements.txt at repo root and fails.

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # hashFiles path is relative to repo root, not working-directory
          key: ${{ runner.os }}-pip-${{ hashFiles('data_jobsabah/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sabah Job Scraper
        run: python scrape_sabah_jobs.py

      - name: Commit and push scraped data
        # git commands must run from repo root, not the working-directory subfolder
        working-directory: .
        run: |
          git config --global user.email "booluckgmie@gmail.com"
          git config --global user.name "booluckgmie"
          git add data_jobsabah/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(TZ='Asia/Kuala_Lumpur' date '+%Y-%m-%d %H:%M MYT')
            git commit -m "chore: scrape sabah jobs – ${DATE}"
            git push
          fi
